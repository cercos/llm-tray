<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LLM Tray</title>
    <style>
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #1b1b1b;
        color: #e6e6e6;
        font-family: "Segoe UI", "Inter", sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      html {
        width: 100%;
        height: 100%;
      }
      * {
        -webkit-user-drag: none;
      }

      #tabbar {
        display: flex;
        align-items: center;
        background: #2a2a2a;
        height: 36px;
        min-height: 36px;
        padding: 0 6px;
        user-select: none;
        transition: background 0.12s ease, box-shadow 0.12s ease;
      }

      #tabbar.drop-target {
        background: #32384d;
        box-shadow: inset 0 -2px 0 #84a8ff;
      }

      body.chromeless #tabbar {
        -webkit-app-region: drag;
      }

      /* Tabs should NOT use the native drag region - we handle dragging via JS */
      body.chromeless .tab {
        -webkit-app-region: no-drag;
      }

      #container {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
      }

      .tab-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        overflow: hidden;
        visibility: hidden;
        pointer-events: none;
      }

      .tab-view.active {
        visibility: visible;
        pointer-events: auto;
      }

      .new-tab-picker {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
            1200px 600px at 80% -100%,
            rgba(120, 120, 120, 0.14),
            transparent
          ),
          #1b1b1b;
      }

      .new-tab-card {
        width: min(720px, 92%);
        border: 1px solid #3e3e3e;
        background: #232323;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.25);
      }

      .new-tab-card h2 {
        margin: 0 0 16px 0;
        font-size: 18px;
        color: #f4f4f4;
        font-weight: 600;
      }

      .new-tab-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
      }

      .new-tab-btn {
        border: 1px solid var(--llm-border, #4a4a4a);
        background: var(--llm-bg, #2f2f2f);
        color: var(--llm-accent, #e6e6e6);
        border-radius: 8px;
        padding: 10px 12px;
        text-transform: capitalize;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
      }

      .new-tab-btn:hover {
        background: var(--llm-bg-hover, #3a3a3a);
        border-color: var(--llm-accent, #6a6a6a);
      }

      .new-tab-btn-icon {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        flex: 0 0 auto;
        background: rgba(255, 255, 255, 0.12);
      }

      .new-tab-btn-label {
        color: #ececec;
        font-size: 13px;
      }

      .tab {
        height: 28px;
        min-width: 0;
        max-width: 220px;
        background: #363636;
        border: none;
        margin-right: 6px;
        padding: 0 8px;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        overflow: hidden;
        cursor: grab;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #ececec;
        box-sizing: border-box;
        -webkit-user-drag: element;
        transition: background 0.12s ease, border-color 0.12s ease;
      }

      .tab:active {
        cursor: grabbing;
      }

      .tab:hover {
        background: #454545;
      }

      .tab.active {
        background: #3e455e;
      }

      .tab .tab-favicon {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        flex: 0 0 auto;
        object-fit: cover;
      }

      .tab .tab-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .tab.dragging {
        opacity: 0.62;
      }

      .tab .close {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: none;
        background: transparent;
        color: #d4d4d4;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .tab .close:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #f0f0f0;
      }

      .tab.active .close:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      #addTab {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: #ececec;
        border-radius: 0;
        cursor: pointer;
        box-sizing: border-box;
        font-size: 20px;
        line-height: 1;
      }

      #addTab:hover {
        background: transparent;
        color: #ffffff;
      }

      #tabbarSpacer {
        flex: 1 1 auto;
      }

      body.chromeless .tab,
      body.chromeless #addTab,
      body.chromeless #downloadsBtn,
      body.chromeless #windowControls,
      body.chromeless #windowControls *,
      body.chromeless .add-menu,
      body.chromeless .add-menu *,
      body.chromeless .downloads-panel,
      body.chromeless .downloads-panel * {
        -webkit-app-region: no-drag;
      }

      #windowControls {
        display: none;
        align-items: center;
        height: 30px;
        margin-left: 6px;
      }

      body.chromeless #windowControls {
        display: inline-flex;
      }

      .window-control {
        width: 44px;
        height: 100%;
        padding: 0;
        border: none;
        background: transparent;
        color: #d6d6d6;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .window-control:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .window-control:active {
        background: rgba(255, 255, 255, 0.14);
      }

      .window-control.close:hover {
        background: #da4453;
      }

      .window-control.close:active {
        background: #c73b49;
      }

      .wc-icon {
        width: 11px;
        height: 11px;
        position: relative;
        display: inline-block;
      }

      .window-control.minimize .wc-icon::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 1px;
        height: 1.4px;
        background: currentColor;
      }

      .window-control.maximize .wc-icon::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 1.4px solid currentColor;
        box-sizing: border-box;
      }

      .window-control.maximize.is-maximized .wc-icon::before {
        width: 8px;
        height: 8px;
        top: 2px;
        left: 0;
      }

      .window-control.maximize.is-maximized .wc-icon::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        top: 0;
        left: 3px;
        border: 1.4px solid currentColor;
        box-sizing: border-box;
        background: #2a2a2a;
      }

      .window-control.close .wc-icon::before,
      .window-control.close .wc-icon::after {
        content: "";
        position: absolute;
        top: 5px;
        left: -1px;
        width: 13px;
        height: 1.4px;
        background: currentColor;
        transform-origin: center;
      }

      .window-control.close .wc-icon::before {
        transform: rotate(45deg);
      }

      .window-control.close .wc-icon::after {
        transform: rotate(-45deg);
      }

      #downloadsBtn {
        position: relative;
        min-width: 34px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        border: 1px solid #555;
        background: #3a3a3a;
        color: #ececec;
        cursor: pointer;
        margin-left: 8px;
        font-size: 14px;
      }

      #downloadsBtn:hover {
        background: #4a4a4a;
      }

      #downloadsBtn.active {
        border-color: #6d86ff;
        background: #3c4368;
      }

      #downloadsBadge {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #2a6df5;
        color: #fff;
        font-size: 10px;
        line-height: 16px;
        text-align: center;
        padding: 0 4px;
        box-sizing: border-box;
        display: none;
      }

      .add-menu {
        position: absolute;
        top: 36px;
        left: 10px;
        background: #333;
        border: 1px solid #555;
        border-radius: 6px;
        z-index: 9999;
        min-width: 190px;
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .add-menu .menu-item {
        border: none;
        background: transparent;
        color: #ececec;
        text-align: left;
        font: inherit;
        padding: 8px 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .add-menu .menu-item:hover,
      .add-menu .menu-item:focus-visible {
        background: #444;
        outline: none;
      }

      .add-menu .menu-item:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .add-menu .menu-separator {
        height: 1px;
        margin: 4px 6px;
        background: #4d4d4d;
      }

      .downloads-panel {
        position: absolute;
        top: 40px;
        right: 8px;
        width: min(420px, calc(100vw - 16px));
        max-height: min(70vh, 560px);
        overflow: hidden;
        background: #26282d;
        border: 1px solid #4c4f57;
        border-radius: 10px;
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.45);
        z-index: 10000;
        display: flex;
        flex-direction: column;
      }

      .downloads-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #3d4047;
        background: #2b2e35;
      }

      .downloads-panel-title {
        font-weight: 600;
        font-size: 13px;
        color: #f2f2f2;
      }

      .downloads-panel-actions {
        display: flex;
        gap: 6px;
      }

      .downloads-mini-btn {
        border: 1px solid #4b4f57;
        background: #373b44;
        color: #d5d8df;
        border-radius: 6px;
        padding: 4px 7px;
        font-size: 11px;
        cursor: pointer;
      }

      .downloads-mini-btn:hover {
        background: #434954;
      }

      .downloads-mini-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .downloads-list {
        padding: 8px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .download-item {
        border: 1px solid #3f434b;
        background: #2f333b;
        border-radius: 8px;
        padding: 8px;
      }

      .download-item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .download-name {
        color: #f1f2f5;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .download-status {
        color: #b7bdc8;
        font-size: 11px;
        white-space: nowrap;
      }

      .download-progress {
        width: 100%;
        height: 4px;
        border-radius: 999px;
        margin-top: 7px;
        background: #23262b;
        overflow: hidden;
      }

      .download-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4d7bff, #64b3ff);
      }

      .download-item-actions {
        margin-top: 7px;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .downloads-empty {
        color: #b3b7c0;
        font-size: 12px;
        padding: 12px 8px;
      }
    </style>
  </head>
  <body>
    <div id="tabbar"></div>
    <div id="container"></div>

    <script src="tabs.js"></script>
    <script>
      const block = (e) => {
        e.preventDefault();
        e.stopPropagation();
        return false;
      };

      window.addEventListener("dragenter", block, false);
      window.addEventListener("dragover", block, false);
      window.addEventListener("dragleave", block, false);

      window.addEventListener(
        "drop",
        (e) => {
          e.preventDefault();
          e.stopPropagation();

          // Optional: inspect dropped items safely
          const files = [...e.dataTransfer.files];
          const urls = e.dataTransfer.getData("text/uri-list");

          console.log("Drop ignored:", { files, urls });
          return false;
        },
        false,
      );
    </script>
  </body>
</html>
